name = "trading-bot"
main = "workers/api/src/index.ts"
compatibility_date = "2024-04-03"

[vars]
ENVIRONMENT = "development"
CTRADER_REDIRECT_URI = "http://localhost:8787/oauth/callback"

[[d1_databases]]
binding = "DB"
database_name = "zebrabyte_db"
database_id = "local_db_id"

[[durable_objects.bindings]]
name = "CTRADER_ACCOUNT_DO"
class_name = "CTraderAccount"

[[services]]
binding = "RISK_WORKER"
service = "zebrabyte-risk"

[[migrations]]
tag = "v1"
new_classes = ["CTraderAccount"]
